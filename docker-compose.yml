version: '3.9'

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: recallai-api
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./server/logs:/app/logs   # persist logs outside container

